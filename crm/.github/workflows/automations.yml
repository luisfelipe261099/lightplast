name: CRM Automations

on:
  schedule:
    # Executa todos os dias às 8 AM UTC (5 AM Brasília)
    - cron: '0 8 * * *'
  # Permite disparo manual
  workflow_dispatch:

jobs:
  trigger-automations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Trigger Review 30 Dias
        run: |
          curl -X POST ${{ secrets.CRM_API_URL }}/api/automations/trigger \
            -H "Content-Type: application/json" \
            -d '{"type":"review_30_days"}'
      
      - name: Trigger Resgate Leads Frios
        run: |
          curl -X POST ${{ secrets.CRM_API_URL }}/api/automations/trigger \
            -H "Content-Type: application/json" \
            -d '{"type":"resgate_leads_frios"}'
      
      - name: Trigger Win-back Clientes
        run: |
          curl -X POST ${{ secrets.CRM_API_URL }}/api/automations/trigger \
            -H "Content-Type: application/json" \
            -d '{"type":"win_back_clientes"}'
      
      - name: Trigger Escalação Leads
        run: |
          curl -X POST ${{ secrets.CRM_API_URL }}/api/automations/trigger \
            -H "Content-Type: application/json" \
            -d '{"type":"escalacao_leads"}'
      
      - name: Log Success
        if: success()
        run: echo "✅ Todas as automações foram disparadas com sucesso"
      
      - name: Log Failure
        if: failure()
        run: echo "❌ Falha ao disparar automações"
