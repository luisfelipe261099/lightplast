<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightPlast Login</title>
    <style>
        :root {
            --primary: #488039;
            --primary-dark: #2f5f24;
            --bg: #f4f8f2;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d9e4d4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #e8f3e3 0%, var(--bg) 45%, #eef5ea 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 16px 45px rgba(47, 95, 36, 0.16);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.94rem;
            margin-bottom: 22px;
        }

        .group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(72, 128, 57, 0.15);
        }

        .actions {
            margin-top: 18px;
            display: grid;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-secondary {
            background: #eef5ea;
            color: var(--primary-dark);
            border: 1px solid #d2e3ca;
        }

        .hint {
            margin-top: 14px;
            font-size: 0.84rem;
            color: var(--muted);
            line-height: 1.45;
        }

        .message {
            margin-top: 10px;
            font-size: 0.86rem;
            color: #b91c1c;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="brand">LightPlast Login</div>
        <p class="subtitle">Acesse o dashboard do CRM</p>

        <form id="loginForm">
            <div class="group">
                <label for="email">E-mail</label>
                <input id="email" type="email" placeholder="admin@lightplast.com" required>
            </div>

            <div class="group">
                <label for="password">Senha</label>
                <input id="password" type="password" placeholder="Sua senha" required>
            </div>

            <div class="actions">
                <button type="submit" class="btn-primary" id="loginBtn">Entrar no CRM</button>
            </div>

            <div class="message" id="message"></div>
        </form>

        <p class="hint">Primeiro acesso? Use as credenciais fornecidas pela equipe de administração.</p>
    </main>

    <script>
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                message.textContent = 'Preencha e-mail e senha para continuar.';
                message.style.color = '#b91c1c';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Autenticando...';
            message.textContent = '';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Armazenar token JWT no localStorage
                    localStorage.setItem('crmToken', data.token);
                    localStorage.setItem('crmUser', JSON.stringify(data.user));
                    
                    message.textContent = 'Login realizado com sucesso. Redirecionando...';
                    message.style.color = '#10b981';
                    
                    setTimeout(() => {
                        window.location.href = '/crm-pro.html';
                    }, 1000);
                } else {
                    message.textContent = data.error || 'Erro ao fazer login';
                    message.style.color = '#b91c1c';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Entrar no CRM';
                }
            } catch (error) {
                message.textContent = 'Erro ao conectar ao servidor: ' + error.message;
                message.style.color = '#b91c1c';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar no CRM';
            }
        });
    </script>
</body>
</html>
